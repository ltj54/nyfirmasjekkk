spring.application.name=nyfirmasjekk
spring.mvc.problemdetails.enabled=true

# Cache-konfigurasjon
spring.cache.type=caffeine
spring.cache.cache-names=enheter,roller,search,announcements,websiteReachability,websiteContent
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=15m,recordStats

# Actuator & Metrics
management.metrics.tags.application=${spring.application.name}
#noinspection SpringBootApplicationProperties
management.endpoints.web.exposure.include=health
#noinspection SpringBootApplicationProperties
management.endpoint.health.show-details=never

# Enkel admin-beskyttelse for outreach/import/export/e-post. Tom verdi gir lokal åpen modus.
#noinspection SpringBootApplicationProperties
company-check.admin-token=${COMPANY_CHECK_ADMIN_TOKEN:}

# SMTP for automatisk tilbudsmail. Passord settes som miljøvariabel, ikke i kode.
#noinspection SpringBootApplicationProperties
spring.mail.host=${APP_MAIL_SMTP_HOST:mail.ltj-production.no}
#noinspection SpringBootApplicationProperties
spring.mail.port=${APP_MAIL_SMTP_PORT:465}
#noinspection SpringBootApplicationProperties
spring.mail.username=${APP_MAIL_USERNAME:kontakt@ltj-production.no}
#noinspection SpringBootApplicationProperties
spring.mail.password=${APP_MAIL_PASSWORD:}
#noinspection SpringBootApplicationProperties
spring.mail.properties.mail.smtp.auth=true
#noinspection SpringBootApplicationProperties
spring.mail.properties.mail.smtp.ssl.enable=true
#noinspection SpringBootApplicationProperties
spring.mail.properties.mail.smtp.connectiontimeout=10000
#noinspection SpringBootApplicationProperties
spring.mail.properties.mail.smtp.timeout=15000
#noinspection SpringBootApplicationProperties
spring.mail.properties.mail.smtp.writetimeout=15000
#noinspection SpringBootApplicationProperties
company-check.mail.from=${APP_MAIL_FROM:kontakt@ltj-production.no}
#noinspection SpringBootApplicationProperties
company-check.mail.from-name=${APP_MAIL_FROM_NAME:LTJ Production}
#noinspection SpringBootApplicationProperties
company-check.mail.reply-to=${APP_MAIL_REPLY_TO:kontakt@ltj-production.no}
#noinspection SpringBootApplicationProperties
company-check.mail.test-recipient=${APP_MAIL_TEST_RECIPIENT:}
