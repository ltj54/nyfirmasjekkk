spring.application.name=nyfirmasjekk
spring.mvc.problemdetails.enabled=true

# Cache-konfigurasjon
spring.cache.type=caffeine
spring.cache.cache-names=enheter,roller,search,announcements,websiteReachability,websiteContent
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=15m

# Actuator & Metrics
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

company-check.outreach-log-path=./data/outreach-log.jsonl
